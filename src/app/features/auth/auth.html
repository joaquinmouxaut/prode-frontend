<div
  class="mx-auto flex min-h-dvh max-w-md flex-col justify-center px-4 py-8 pb-[max(2rem,env(safe-area-inset-bottom,0px))] pt-[max(2rem,env(safe-area-inset-top,0px))]"
>
  <div class="mb-8 text-center">
    <div class="mx-auto mb-4 flex justify-center">
      <app-brand-mark size="md" />
    </div>
    <h1 class="font-display text-3xl tracking-wide text-stone-100 sm:text-4xl">
      Entrá a {{ branding.appName }}
    </h1>
    <p class="mt-2 text-sm text-prode-muted">Predicciones, puntos y tablero en vivo.</p>
  </div>

  <div class="card-sport p-1">
    <div class="grid grid-cols-2 gap-1 rounded-xl bg-prode-bg/60 p-1">
      <button
        type="button"
        (click)="setMode('login')"
        class="touch-target rounded-lg py-3 text-sm font-semibold transition"
        [class.bg-prode-elevated]="mode() === 'login'"
        [class.text-white]="mode() === 'login'"
        [class.text-prode-muted]="mode() !== 'login'"
      >
        <span class="inline-flex items-center justify-center gap-2">
          <lucide-icon name="log-in" [size]="18" />
          Ingresar
        </span>
      </button>
      <button
        type="button"
        (click)="setMode('register')"
        class="touch-target rounded-lg py-3 text-sm font-semibold transition"
        [class.bg-prode-elevated]="mode() === 'register'"
        [class.text-white]="mode() === 'register'"
        [class.text-prode-muted]="mode() !== 'register'"
      >
        <span class="inline-flex items-center justify-center gap-2">
          <lucide-icon name="user-plus" [size]="18" />
          Registro
        </span>
      </button>
    </div>

    <div class="p-4 sm:p-5">
      @if (error()) {
        <p
          class="mb-4 rounded-xl border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-sm text-rose-200"
          role="alert"
        >
          {{ error() }}
        </p>
      }

      @if (mode() === 'login') {
        <form [formGroup]="loginForm" (ngSubmit)="submitLogin()" class="space-y-4">
          <label class="block">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wider text-prode-muted"
              >Email</span
            >
            <input
              type="email"
              formControlName="email"
              autocomplete="email"
              class="input-field"
              placeholder="vos@equipo.com"
            />
          </label>
          <label class="block">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wider text-prode-muted"
              >Contraseña</span
            >
            <input
              type="password"
              formControlName="password"
              autocomplete="current-password"
              class="input-field"
              placeholder="Tu contraseña"
            />
          </label>
          <button type="submit" [disabled]="busy()" class="btn-primary">
            @if (busy()) {
              <lucide-icon name="loader-2" class="animate-spin" [size]="18" />
            } @else {
              <lucide-icon name="log-in" [size]="18" />
            }
            Entrar
          </button>
        </form>
      } @else {
        <form [formGroup]="registerForm" (ngSubmit)="submitRegister()" class="space-y-4">
          <label class="block">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wider text-prode-muted"
              >Nombre</span
            >
            <input
              type="text"
              formControlName="name"
              autocomplete="name"
              class="input-field"
              placeholder="Tu nombre o apodo"
            />
          </label>
          <label class="block">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wider text-prode-muted"
              >Email</span
            >
            <input
              type="email"
              formControlName="email"
              autocomplete="email"
              class="input-field"
              placeholder="vos@equipo.com"
            />
          </label>
          <label class="block">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wider text-prode-muted"
              >Contraseña</span
            >
            <input
              type="password"
              formControlName="password"
              autocomplete="new-password"
              class="input-field"
              placeholder="Al menos 6 caracteres"
            />
          </label>
          <label class="block">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wider text-prode-muted"
              >Confirmar contraseña</span
            >
            <input
              type="password"
              formControlName="confirmPassword"
              autocomplete="new-password"
              class="input-field"
              placeholder="Repetí la contraseña"
            />
          </label>
          @if (registerForm.hasError('passwordMismatch') && registerForm.touched) {
            <p class="text-xs text-rose-300">Las contraseñas no coinciden.</p>
          }
          <button
            type="submit"
            [disabled]="busy()"
            class="touch-target inline-flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-stone-300 to-stone-100 py-3 text-sm font-bold uppercase tracking-wide text-prode-bg shadow-lg shadow-stone-900/20 transition hover:brightness-110 disabled:opacity-50"
          >
            @if (busy()) {
              <lucide-icon name="loader-2" class="animate-spin" [size]="18" />
            } @else {
              <lucide-icon name="user-plus" [size]="18" />
            }
            Crear cuenta
          </button>
        </form>
      }
    </div>
  </div>

  <p class="mt-6 text-center text-xs text-prode-muted">
    API en <code class="rounded bg-prode-elevated px-1 py-0.5 text-[10px] text-prode-blue">localhost:3000</code>
  </p>
</div>
