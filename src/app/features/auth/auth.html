<div class="mx-auto flex min-h-dvh max-w-md flex-col justify-center px-4 py-10">
  <div class="mb-8 text-center">
    <div
      class="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br from-prode-blue/40 to-prode-accent/30 ring-1 ring-white/10"
    >
      <lucide-icon name="trophy" class="h-7 w-7 text-prode-gold" aria-hidden="true" />
    </div>
    <h1 class="font-display text-3xl tracking-wide text-white">Entrá al prode</h1>
    <p class="mt-1 text-sm text-prode-muted">Predicciones, puntos y tablero en vivo.</p>
  </div>

  <div class="card-sport p-1">
    <div class="grid grid-cols-2 gap-1 rounded-xl bg-prode-bg/60 p-1">
      <button
        type="button"
        (click)="setMode('login')"
        class="rounded-lg py-2.5 text-sm font-semibold transition"
        [class.bg-prode-elevated]="mode() === 'login'"
        [class.text-white]="mode() === 'login'"
        [class.text-prode-muted]="mode() !== 'login'"
      >
        <span class="inline-flex items-center justify-center gap-2">
          <lucide-icon name="log-in" [size]="18" />
          Ingresar
        </span>
      </button>
      <button
        type="button"
        (click)="setMode('register')"
        class="rounded-lg py-2.5 text-sm font-semibold transition"
        [class.bg-prode-elevated]="mode() === 'register'"
        [class.text-white]="mode() === 'register'"
        [class.text-prode-muted]="mode() !== 'register'"
      >
        <span class="inline-flex items-center justify-center gap-2">
          <lucide-icon name="user-plus" [size]="18" />
          Registro
        </span>
      </button>
    </div>

    <div class="p-5">
      @if (error()) {
        <p
          class="mb-4 rounded-xl border border-rose-500/30 bg-rose-500/10 px-3 py-2 text-sm text-rose-200"
          role="alert"
        >
          {{ error() }}
        </p>
      }

      @if (mode() === 'login') {
        <form [formGroup]="loginForm" (ngSubmit)="submitLogin()" class="space-y-4">
          <label class="block">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wider text-prode-muted"
              >Email</span
            >
            <input
              type="email"
              formControlName="email"
              autocomplete="email"
              class="w-full rounded-xl border border-prode-border bg-prode-bg px-3 py-3 text-sm text-white outline-none ring-prode-accent/40 placeholder:text-slate-600 focus:ring-2"
              placeholder="vos@equipo.com"
            />
          </label>
          <button
            type="submit"
            [disabled]="busy()"
            class="flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-prode-accent to-emerald-400 py-3 text-sm font-bold uppercase tracking-wide text-prode-bg shadow-lg shadow-emerald-900/30 transition hover:brightness-110 disabled:opacity-50"
          >
            @if (busy()) {
              <lucide-icon name="loader-2" class="animate-spin" [size]="18" />
            } @else {
              <lucide-icon name="log-in" [size]="18" />
            }
            Entrar
          </button>
        </form>
      } @else {
        <form [formGroup]="registerForm" (ngSubmit)="submitRegister()" class="space-y-4">
          <label class="block">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wider text-prode-muted"
              >Nombre</span
            >
            <input
              type="text"
              formControlName="name"
              autocomplete="name"
              class="w-full rounded-xl border border-prode-border bg-prode-bg px-3 py-3 text-sm text-white outline-none ring-prode-accent/40 placeholder:text-slate-600 focus:ring-2"
              placeholder="Tu nombre o apodo"
            />
          </label>
          <label class="block">
            <span class="mb-1 block text-xs font-semibold uppercase tracking-wider text-prode-muted"
              >Email</span
            >
            <input
              type="email"
              formControlName="email"
              autocomplete="email"
              class="w-full rounded-xl border border-prode-border bg-prode-bg px-3 py-3 text-sm text-white outline-none ring-prode-accent/40 placeholder:text-slate-600 focus:ring-2"
              placeholder="vos@equipo.com"
            />
          </label>
          <button
            type="submit"
            [disabled]="busy()"
            class="flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-prode-blue to-sky-300 py-3 text-sm font-bold uppercase tracking-wide text-prode-bg shadow-lg shadow-sky-900/30 transition hover:brightness-110 disabled:opacity-50"
          >
            @if (busy()) {
              <lucide-icon name="loader-2" class="animate-spin" [size]="18" />
            } @else {
              <lucide-icon name="user-plus" [size]="18" />
            }
            Crear cuenta
          </button>
        </form>
      }
    </div>
  </div>

  <p class="mt-6 text-center text-xs text-prode-muted">
    API en <code class="rounded bg-prode-elevated px-1 py-0.5 text-[10px] text-prode-blue">localhost:3000</code>
  </p>
</div>
