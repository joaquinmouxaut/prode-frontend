<div class="flex min-h-dvh flex-col pb-[calc(5rem+env(safe-area-inset-bottom,0px))] md:pb-6">
  <header
    class="sticky top-0 z-30 border-b border-prode-border/80 bg-prode-bg/90 px-4 pb-3 pt-[max(0.75rem,env(safe-area-inset-top,0px))] backdrop-blur-md md:px-8"
  >
    <div class="mx-auto flex max-w-5xl items-center gap-2">
      <a routerLink="/fixtures" class="group flex min-h-11 shrink-0 items-center gap-2.5">
        <app-brand-mark size="sm" />
        <div class="min-w-0 leading-tight">
          <p class="truncate font-display text-lg tracking-wide text-stone-100 sm:text-xl">{{ branding.appName }}</p>
          <p class="truncate text-[10px] font-medium uppercase tracking-[0.2em] text-prode-muted">
            {{ branding.tagline }}
          </p>
        </div>
      </a>
      <nav class="relative z-20 ml-auto hidden items-center gap-2 sm:flex" aria-label="Navegación principal">
        <a
          routerLink="/fixtures"
          routerLinkActive="bg-prode-elevated text-white ring-1 ring-prode-accent/40"
          [routerLinkActiveOptions]="{ exact: false }"
          class="nav-link"
        >
          Partidos
        </a>
        <a
          routerLink="/leaderboard"
          routerLinkActive="bg-prode-elevated text-white ring-1 ring-prode-accent/40"
          class="nav-link"
        >
          Ranking
        </a>
        <a
          routerLink="/reglas"
          routerLinkActive="bg-prode-elevated text-white ring-1 ring-prode-accent/40"
          class="nav-link"
        >
          Reglas
        </a>
        <a
          routerLink="/setup"
          routerLinkActive="bg-prode-elevated text-white ring-1 ring-prode-accent/40"
          class="nav-link"
        >
          Prode inicial
        </a>
        @if (auth.isAdmin()) {
          <a
            routerLink="/admin"
            routerLinkActive="bg-prode-elevated text-white ring-1 ring-prode-accent/40"
            class="nav-link"
          >
            Admin
          </a>
        }
      </nav>
      <button
        type="button"
        (click)="logout()"
        class="relative z-20 touch-target inline-flex shrink-0 items-center justify-center gap-2 rounded-lg border border-prode-border bg-prode-elevated px-3 py-2 text-xs font-semibold text-prode-muted transition hover:border-rose-500/40 hover:text-rose-300"
      >
        <lucide-icon name="log-out" [size]="18" aria-hidden="true" />
        <span class="hidden sm:inline">Salir</span>
      </button>
    </div>
  </header>

  <main class="mx-auto w-full max-w-5xl flex-1 px-4 py-4 md:px-8 md:py-8">
    <router-outlet />
  </main>

  <nav
    class="fixed bottom-0 left-0 right-0 z-40 border-t border-prode-border bg-prode-surface/98 backdrop-blur-lg md:hidden"
    aria-label="Principal"
  >
    <div
      class="grid gap-0.5 px-1 pb-[max(0.5rem,env(safe-area-inset-bottom,0px))] pt-1"
      [class.grid-cols-4]="!auth.isAdmin()"
      [class.grid-cols-5]="auth.isAdmin()"
    >
      <a
        routerLink="/fixtures"
        routerLinkActive="bg-prode-elevated/80 text-prode-accent"
        [routerLinkActiveOptions]="{ exact: false }"
        class="touch-target flex flex-col items-center justify-center gap-0.5 rounded-lg py-1.5 text-[10px] font-semibold text-prode-muted"
      >
        <lucide-icon name="layout-grid" [size]="24" />
        Partidos
      </a>
      <a
        routerLink="/leaderboard"
        routerLinkActive="bg-prode-elevated/80 text-prode-accent"
        class="touch-target flex flex-col items-center justify-center gap-0.5 rounded-lg py-1.5 text-[10px] font-semibold text-prode-muted"
      >
        <lucide-icon name="medal" [size]="24" />
        Ranking
      </a>
      <a
        routerLink="/reglas"
        routerLinkActive="bg-prode-elevated/80 text-prode-accent"
        class="touch-target flex flex-col items-center justify-center gap-0.5 rounded-lg py-1.5 text-[10px] font-semibold text-prode-muted"
      >
        <lucide-icon name="book-open" [size]="24" />
        Reglas
      </a>
      <a
        routerLink="/setup"
        routerLinkActive="bg-prode-elevated/80 text-prode-accent"
        class="touch-target flex flex-col items-center justify-center gap-0.5 rounded-lg py-1.5 text-[10px] font-semibold text-prode-muted"
      >
        <lucide-icon name="shield" [size]="24" />
        Inicial
      </a>
      @if (auth.isAdmin()) {
        <a
          routerLink="/admin"
          routerLinkActive="bg-prode-elevated/80 text-prode-accent"
          class="touch-target flex flex-col items-center justify-center gap-0.5 rounded-lg py-1.5 text-[10px] font-semibold text-prode-muted"
        >
          <lucide-icon name="settings" [size]="24" />
          Admin
        </a>
      }
    </div>
  </nav>
</div>
