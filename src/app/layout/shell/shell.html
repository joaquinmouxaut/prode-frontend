<div class="flex min-h-dvh flex-col pb-[calc(4.5rem+env(safe-area-inset-bottom,0px))] md:pb-6">
  <header
    class="sticky top-0 z-30 border-b border-prode-border/80 bg-prode-bg/85 px-4 py-3 backdrop-blur-md md:px-8"
  >
    <div class="mx-auto flex max-w-5xl items-center justify-between gap-3">
      <a routerLink="/fixtures" class="group flex items-center gap-2">
        <span
          class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-prode-blue/30 to-prode-accent/25 ring-1 ring-white/10"
        >
          <lucide-icon name="trophy" class="h-5 w-5 text-prode-gold" aria-hidden="true" />
        </span>
        <div class="leading-tight">
          <p class="font-display text-xl tracking-wide text-white">PRODE</p>
          <p class="text-[10px] font-medium uppercase tracking-[0.2em] text-prode-muted">Mundial</p>
        </div>
      </a>
      <div class="hidden items-center gap-2 sm:flex">
        <a
          routerLink="/fixtures"
          routerLinkActive="bg-prode-elevated text-white ring-1 ring-prode-accent/40"
          [routerLinkActiveOptions]="{ exact: false }"
          class="rounded-full px-3 py-2 text-sm font-medium text-prode-muted transition hover:text-white"
        >
          Partidos
        </a>
        <a
          routerLink="/leaderboard"
          routerLinkActive="bg-prode-elevated text-white ring-1 ring-prode-accent/40"
          class="rounded-full px-3 py-2 text-sm font-medium text-prode-muted transition hover:text-white"
        >
          Ranking
        </a>
        <a
          routerLink="/setup"
          routerLinkActive="bg-prode-elevated text-white ring-1 ring-prode-accent/40"
          class="rounded-full px-3 py-2 text-sm font-medium text-prode-muted transition hover:text-white"
        >
          Prode inicial
        </a>
      </div>
      <button
        type="button"
        (click)="logout()"
        class="inline-flex items-center gap-2 rounded-full border border-prode-border bg-prode-elevated px-3 py-2 text-xs font-semibold text-prode-muted transition hover:border-rose-500/40 hover:text-rose-300"
      >
        <lucide-icon name="log-out" [size]="16" aria-hidden="true" />
        <span class="hidden sm:inline">Salir</span>
      </button>
    </div>
  </header>

  <main class="mx-auto w-full max-w-5xl flex-1 px-4 py-4 md:px-8 md:py-8">
    <router-outlet />
  </main>

  <nav
    class="fixed bottom-0 left-0 right-0 z-40 border-t border-prode-border bg-prode-surface/95 pb-[env(safe-area-inset-bottom,0px)] backdrop-blur-lg md:hidden"
    aria-label="Principal"
  >
    <div class="grid grid-cols-3 gap-1 px-2 py-2">
      <a
        routerLink="/fixtures"
        routerLinkActive="text-prode-accent"
        [routerLinkActiveOptions]="{ exact: false }"
        class="flex flex-col items-center gap-1 rounded-xl py-2 text-[11px] font-semibold text-prode-muted"
      >
        <lucide-icon name="layout-grid" [size]="22" />
        Partidos
      </a>
      <a
        routerLink="/leaderboard"
        routerLinkActive="text-prode-accent"
        class="flex flex-col items-center gap-1 rounded-xl py-2 text-[11px] font-semibold text-prode-muted"
      >
        <lucide-icon name="medal" [size]="22" />
        Ranking
      </a>
      <a
        routerLink="/setup"
        routerLinkActive="text-prode-accent"
        class="flex flex-col items-center gap-1 rounded-xl py-2 text-[11px] font-semibold text-prode-muted"
      >
        <lucide-icon name="shield" [size]="22" />
        Prode
      </a>
    </div>
  </nav>
</div>
